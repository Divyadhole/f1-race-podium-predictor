<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">F1 Race Podium Predictor research poster</title><desc id="desc">Portfolio research poster describing challenge, methods, validation, and results.</desc>
<defs><linearGradient id="header" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#25131A"/><stop offset="1" stop-color="#D7263D"/></linearGradient><pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="2" fill="#ffffff" opacity=".14"/></pattern></defs>
<rect width="1600" height="900" fill="#F5F8FC"/><rect width="1600" height="270" fill="url(#header)"/><rect x="1050" width="550" height="270" fill="url(#dots)"/>
<circle cx="1450" cy="126" r="84" fill="none" stroke="#FFD166" stroke-width="11" opacity=".9"/><circle cx="1450" cy="126" r="42" fill="#FFD166" opacity=".95"/><text x="1415" y="140" fill="#25131A" font-family="Arial" font-size="32" font-weight="800">DD</text>
<text x="74" y="70" fill="#FFD166" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700"><tspan x="74" dy="0">MOTORSPORT ANALYTICS · ML PORTFOLIO</tspan></text>
<text x="74" y="136" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800"><tspan x="74" dy="0">F1 Race Podium Predictor</tspan></text>
<text x="74" y="230" fill="#DAE9F7" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400"><tspan x="74" dy="0">Leakage-safe podium probabilities from grid, form, and circuit context</tspan></text>
<rect x="55" y="306" width="460" height="420" rx="18" fill="#FFFFFF"/><rect x="548" y="306" width="460" height="420" rx="18" fill="#FFFFFF"/><rect x="1041" y="306" width="504" height="420" rx="18" fill="#FFFFFF"/>
<text x="75" y="360" fill="#D7263D" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700"><tspan x="75" dy="0">01  ·  RESEARCH QUESTION</tspan></text>
<text x="75" y="412" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800"><tspan x="75" dy="0">Challenge</tspan></text>
<text x="75" y="456" fill="#40516A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400"><tspan x="75" dy="0">Go beyond grid position while preserving</tspan><tspan x="75" dy="31">everything known before lights out.</tspan></text>
<path d="M75 575H495" stroke="#DCE5EF"/><text x="75" y="618" fill="#25131A" font-family="Arial" font-size="21" font-weight="800">Portfolio objective</text><text x="75" y="655" fill="#40516A" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400"><tspan x="75" dy="0">A transparent, reproducible ML workflow</tspan><tspan x="75" dy="27">with measurable decisions and delivery.</tspan></text>
<text x="575" y="360" fill="#D7263D" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700"><tspan x="575" dy="0">02  ·  METHODS</tspan></text><text x="575" y="412" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800"><tspan x="575" dy="0">How it works</tspan></text><circle cx="592" cy="470" r="20" fill="#D7263D"/><text x="592" y="477" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="700">1</text><text x="630" y="460" fill="#253247" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600"><tspan x="630" dy="0">Join six race, driver, constructor, and</tspan><tspan x="630" dy="26">result tables</tspan></text><circle cx="592" cy="562" r="20" fill="#D7263D"/><text x="592" y="569" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="700">2</text><text x="630" y="552" fill="#253247" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600"><tspan x="630" dy="0">Create lagged form and circuit features</tspan></text><circle cx="592" cy="654" r="20" fill="#D7263D"/><text x="592" y="661" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="700">3</text><text x="630" y="644" fill="#253247" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600"><tspan x="630" dy="0">Compare logistic and gradient-boosting</tspan><tspan x="630" dy="26">models</tspan></text>
<text x="1068" y="360" fill="#D7263D" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700"><tspan x="1068" dy="0">03  ·  RESULTS</tspan></text><text x="1068" y="412" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800"><tspan x="1068" dy="0">Measured outcome</tspan></text>
<text x="1068" y="458" fill="#40516A" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400"><tspan x="1068" dy="0">The selected gradient model ranks the</tspan><tspan x="1068" dy="28">latest grid through a typed API and</tspan><tspan x="1068" dy="28">CLI.</tspan></text><path d="M1068 700H1495" stroke="#B9C7D7" stroke-width="2"/><rect x="1088" y="649" width="58" height="51" rx="6" fill="#D7263D"/><text x="1070" y="637" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700"><tspan x="1070" dy="0">92.50%</tspan></text><text x="1068" y="721" fill="#526278" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600"><tspan x="1068" dy="0">Accuracy</tspan></text><rect x="1204" y="652" width="58" height="48" rx="6" fill="#D7263D"/><text x="1186" y="640" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700"><tspan x="1186" dy="0">0.2351</tspan></text><text x="1184" y="721" fill="#526278" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600"><tspan x="1184" dy="0">Log loss</tspan></text><rect x="1320" y="648" width="58" height="52" rx="6" fill="#D7263D"/><text x="1302" y="636" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700"><tspan x="1302" dy="0">0.9520</tspan></text><text x="1300" y="721" fill="#526278" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600"><tspan x="1300" dy="0">ROC-AUC</tspan></text>
<rect x="55" y="748" width="1490" height="94" rx="18" fill="#FFFFFF"/><text x="75" y="776" fill="#D7263D" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700"><tspan x="75" dy="0">VALIDATION</tspan></text><rect x="75" y="772" width="134" height="39" rx="19" fill="#E7F3F1"/><circle cx="94" cy="792" r="7" fill="#D7263D"/><text x="108" y="798" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"><tspan x="108" dy="0">Join integrity</tspan></text><rect x="225" y="772" width="134" height="39" rx="19" fill="#E7F3F1"/><circle cx="244" cy="792" r="7" fill="#D7263D"/><text x="258" y="798" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"><tspan x="258" dy="0">Temporal</tspan><tspan x="258" dy="17">holdout</tspan></text><rect x="375" y="772" width="134" height="39" rx="19" fill="#E7F3F1"/><circle cx="394" cy="792" r="7" fill="#D7263D"/><text x="408" y="798" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"><tspan x="408" dy="0">Calibrated</tspan><tspan x="408" dy="17">output</tspan></text><text x="1074" y="783" fill="#D7263D" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700"><tspan x="1074" dy="0">Conclusion</tspan></text><text x="1074" y="812" fill="#25131A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600"><tspan x="1074" dy="0">From validated data to a deployable</tspan><tspan x="1074" dy="23">artifact with documented limitations.</tspan></text>
<rect y="866" width="1600" height="34" fill="#25131A"/><text x="74" y="889" fill="#D6E3F0" font-family="Arial" font-size="15">DIVYA DHOLE  ·  MACHINE LEARNING PORTFOLIO  ·  REPRODUCIBLE PROJECT POSTER</text><text x="1334" y="889" fill="#FFD166" font-family="Arial" font-size="15" font-weight="700">PROJECT BRIEF</text>
